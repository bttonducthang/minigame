<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Trò chơi giáo dục Bảo tàng Tôn Đức Thắng</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  min-height:100vh;

  background-image:url("assets/bg1.png");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  display:flex;
  flex-direction:column;
  align-items:center;

  color:white;
  text-align:center;

  padding:20px 15px;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.15);
  z-index:-1;
}

/* Logo */
.logo{
  width:120px;
  margin-top:5px;
}

/* Title */
.title{
  margin-top:10px;
  font-size:clamp(28px,6vw,48px);
  color:#b0050d;

  text-shadow:
    0 0 5px white,
    0 0 10px rgba(255,255,255,.8);
}

.title .line1{
  font-family:'Playfair Display', serif;
}

.title .line2{
  font-family:'Great Vibes', cursive;
  font-size:1.15em;
  letter-spacing:2px;
}

/* ===== KHUNG CHÍNH ===== */
.game-panel{
  margin-top:25px;

  width:100%;
  max-width:980px;

  padding:25px 20px;

  border-radius:22px;

  background:linear-gradient(135deg,#0a3d62,#145da0);

  border:3px solid transparent;

  background-image:
    linear-gradient(135deg,#0a3d62,#145da0),
    linear-gradient(
      45deg,
      red,orange,yellow,green,
      cyan,blue,violet,red
    );

  background-origin:border-box;
  background-clip:padding-box,border-box;

  background-size:100% 100%,300% 300%;

  animation:ledBorder 8s linear infinite;

  box-shadow:
    0 0 20px rgba(0,0,0,.5),
    0 0 25px rgba(255,255,255,.15);
}

@keyframes ledBorder{
  0%{
    background-position:0% 0%,0% 50%;
  }
  100%{
    background-position:0% 0%,300% 50%;
  }
}

/* Tiêu đề panel */
.panel-title{
  font-size:clamp(24px,5vw,34px);
  font-weight:bold;
  margin-bottom:25px;
  color:#ffeb3b;

  text-shadow:
    0 0 10px rgba(0,0,0,.5),
    0 0 12px rgba(255,235,59,.5);
}

/* Grid game */
.game-grid{
  display:flex;
  justify-content:center;
  gap:28px;
  flex-wrap:wrap;
}

/* Item */
.game-item{
  cursor:pointer;
  transition:.25s;
  width:260px;
}

.game-item:hover{
  transform:translateY(-6px) scale(1.03);
}

.game-item:active{
  transform:scale(.96);
}

/* Khung LED ảnh */
.img-wrapper{
  position:relative;
  display:inline-block;

  padding:5px;
  border-radius:18px;

  background:linear-gradient(
    45deg,
    red,orange,yellow,
    green,cyan,blue,
    violet,red
  );

  background-size:400%;
  animation:ledBorderImg 10s linear infinite;

  box-shadow:
    0 0 15px rgba(255,255,255,.3),
    0 0 25px rgba(255,255,255,.15);
}

@keyframes ledBorderImg{
  0%{
    background-position:0% 50%;
  }
  100%{
    background-position:400% 50%;
  }
}

.img-wrapper img{
  width:100%;
  display:block;
  border-radius:14px;
}

/* Tên game */
.game-name{
  margin-top:12px;

  font-size:20px;
  font-weight:bold;

  color:white;

  text-shadow:
    0 0 8px rgba(0,0,0,.6);
}

/* Feedback button */
.feed-btn{
  position:fixed;
  top:12px;
  left:12px;

  width:62px;
  height:62px;

  border-radius:50%;
  overflow:hidden;

  border:1px solid rgba(255,255,255,.45);

  background:transparent;

  cursor:pointer;

  z-index:999;

  box-shadow:
    0 0 10px rgba(255,255,255,.8),
    0 0 18px rgba(255,255,255,.5);

  animation:pulseMenu 1.8s infinite;
}

.feed-btn img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.feed-btn:hover{
  transform:scale(1.08);
}

.feed-btn:active{
  transform:scale(.92);
}

@keyframes pulseMenu{
  0%{
    transform:scale(1);
  }
  50%{
    transform:scale(1.08);
  }
  100%{
    transform:scale(1);
  }
}

/* MOBILE */
@media (max-width:768px){

  .logo{
    width:95px;
  }

  .game-panel{
    padding:18px 14px;
  }

  .game-grid{
    gap:22px;
  }

  .game-item{
    width:100%;
    max-width:260px;
  }

  .game-name{
    font-size:18px;
  }

  .feed-btn{
    width:58px;
    height:58px;
    top:10px;
    left:10px;
  }
}
</style>
</head>

<body>

<!-- Logo -->
<a href="https://baotangtonducthang.vn/">
  <img src="assets/logo.png" class="logo">
</a>

<!-- Title -->
<div class="title">
  <div class="line1">Trò chơi giáo dục</div>
  <div class="line2">Bảo tàng Tôn Đức Thắng</div>
</div>

<!-- Khung game -->
<div class="game-panel">

  <div class="panel-title">
    🎮 Chọn trò chơi
  </div>

  <div class="game-grid">

    <!-- GAME 0 -->
    <div class="game-item"
      onclick="window.location.href='game0.html'">

      <div class="img-wrapper">
        <img src="assets/minigame_0.png">
      </div>

      <div class="game-name">
        [Dấu ấn thời gian]
      </div>
    </div>

    <!-- GAME 1 -->
    <div class="game-item"
      onclick="window.location.href='game1.html'">

      <div class="img-wrapper">
        <img src="assets/minigame_1.png">
      </div>

      <div class="game-name">
        [Vòng quay lịch sử]
      </div>
    </div>

    <!-- GAME 2 -->
    <div class="game-item"
      onclick="window.location.href='game2.html'">

      <div class="img-wrapper">
        <img src="assets/minigame_2.png">
      </div>

      <div class="game-name">
        [Tìm hình giống nhau]
      </div>
    </div>

  </div>
</div>

<!-- Feedback -->
<button class="feed-btn"
onclick="window.open('https://bttonducthang.github.io/feedback-baotangtonducthang/')">
  <img src="assets/feedback.png">
</button>

</body>
</html>
