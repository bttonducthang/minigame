<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mini Game 1 - Vòng quay lịch sử</title>
<!-- Giữ UI game1, chỉ nâng cấp phần JSON -->
<style>
/* Giữ nguyên UI hiện tại */
body{
  font-family:Arial,sans-serif;
  background:#123;
  color:#fff;
  text-align:center;
  padding:20px;
  margin:0}
  
.box{max-width:700px;margin:auto}
  
.top{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  
.info{background:#0a3d62;padding:10px 14px;border-radius:10px}
  
.wheel{
  width:280px;
  height:280px;
  border-radius:50%;
  margin:20px auto;
  border:8px solid #fff;
  display:flex;
  align-items:center;
  justify-content:center;
  background:conic-gradient(#f55 0 72deg,#59f 72deg 144deg,#fd5 144deg 216deg,#8c5 216deg 288deg,#c5f 288deg 360deg);
  
  transition:transform 4s cubic-bezier(.17,.67,.15,1)}
  
  button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer}
  
  .main{background:#ff7b00;color:#fff}

  .popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:none;
    align-items:center;
    justify-content:center}
  
  .panel{
    background:#0a3d62;
    padding:20px;
    border-radius:14px;
    max-width:520px;
    width:92%}
  
  .ans{
    display:block;
    width:100%;
    margin:8px 0;
    padding:12px}
  
  .correct{background:#0a4}
  
  .wrong{background:#b00}
  
  #status{margin-top:10px;color:#ffeb3b;min-height:24px}
</style>
</head>
<body>
<div class='box'>
<h1>Mini Game - Vòng quay lịch sử</h1>
<div class='top'>
<div class='info'>⭐ Điểm: <span id='score'>0</span></div>
<div class='info'>⏰ <span id='time'>01:00</span></div>
<div class='info'>📚 Còn: <span id='remain'>0</span></div>
</div>
<div id='wheel' class='wheel'>QUAY</div>
<button id='spinBtn' class='main' onclick='spinWheel()' disabled>QUAY 🎡</button>
<p><button onclick='location.href="index.html"'>VỀ MENU</button></p>
<div id='status'>Đang tải câu hỏi...</div>
</div>
<div id='popup' class='popup'><div class='panel'><h2>CÂU HỎI</h2><div id='questionText'></div><div id='answers'></div></div></div>
<div id='finish' class='popup'><div class='panel'><h2>Hoàn thành</h2><div id='finalText'></div><br><button class='main' onclick='restartGame()'>CHƠI LẠI</button></div></div>
<script>
/* ===================== CÂU HỎI GỐC TRONG CODE (fallback) ===================== */
const originalQuestions=[
{q:'1) Bác Tôn sinh vào ngày, tháng, năm nào?',answers:['20/8/1885','20/8/1886','20/8/1887','20/8/1888'],
 correct:3},
{q:'2) Bác Tôn bị giam giữ tại nhà tù Côn Đảo bao nhiêu năm?',answers:['10 năm','15 năm','20 năm','25 năm'],
 correct:1},
{q:'3) Bác Tôn làm Chủ tịch nước trong bao nhiêu năm?',answers:['9 năm','10 năm','11 năm','12 năm'],
 correct:2},
{q:'4) Bác Tôn được bầu Phó Chủ tịch nước vào năm nào?',answers:['1960','1965','1969','1975'],
 correct:0},
{q:'5) Bác Tôn từng học nghề tại trường nào?',answers:['Cơ Khí Châu Á','Công Nghệ Á Châu','Cơ Khí Á Châu','Kỹ Thuật Châu Á'],
 correct:2}
];

let bank=[];
  let questions=[];
  let score=0;
  let rotate=0;
  let currentIndex=-1;
  let spinning=false;
  let timeLeft=60;
  let timer=null;
  let started=false;
  let totalAsked=0;
  
function shuffleArray(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function updateStatus(msg){
  document.getElementById('status').innerText=msg;
}
function updateUI(){
  document.getElementById('score').innerText=score;document.getElementById('remain').innerText=questions.length;
  updateTime();
}
function updateTime(){
  let m=String(Math.floor(timeLeft/60)).padStart(2,'0');
  let s=String(timeLeft%60).padStart(2,'0');document.getElementById('time').innerText=`${m}:${s}`;
}
function validateQuestions(data){
  return Array.isArray(data)&&data.every(item=>item&&typeof item.q==='string'&&Array.isArray(item.answers)&&item.answers.length===4&&Number.isInteger(item.correct)&&item.correct>=0&&item.correct<4);
}

/* ===================== LOAD JSON ===================== */
async function initGame(){
 try{
   const res=await fetch('assets/question_game1/questions.json',{cache:'no-store'});
   if(!res.ok) throw new Error('HTTP '+res.status);
   const text=await res.text();
   const parsed=JSON.parse(text);
   if(!validateQuestions(parsed)) throw new Error('Sai cấu trúc JSON');
   bank=parsed;
   updateStatus('Đã tải câu hỏi từ JSON');
 }catch(err){
   console.warn('Không load được JSON, dùng câu hỏi trong code:',err);
   bank=originalQuestions;
   updateStatus('Đang dùng bộ câu hỏi mặc định trong code');
 }
 totalAsked=Math.min(5,bank.length);
 questions=shuffleArray(bank).slice(0,totalAsked);
 updateUI();
 document.getElementById('spinBtn').disabled=false;
}

function startTimer(){
  f(started)return;
  started=true;timer=setInterval(()=>{timeLeft--;updateTime();
                                      if(timeLeft<=0)finishGame();
                                     },1000);
}
function spinWheel(){
  if(spinning||questions.length===0)return;
  startTimer();
  spinning=true;
  currentIndex=Math.floor(Math.random()*questions.length);
  let each=360/questions.length;
  let stopDeg=360-(currentIndex*each)-each/2;
  rotate+=1800+stopDeg;
  document.getElementById('wheel').style.transform=`rotate(${rotate}deg)`;
  document.getElementById('spinBtn').disabled=true;
  setTimeout(()=>{showQuestion();
                  spinning=false;
                  document.getElementById('spinBtn').disabled=false;
                 },4200);
}
  
function showQuestion(){
  const q=questions[currentIndex];
  document.getElementById('popup').style.display='flex';
  document.getElementById('questionText').innerText=q.q;
  const wrap=document.getElementById('answers');
  wrap.innerHTML='';
  q.answers.forEach((ans,i)=>{const b=document.createElement('button');
                              b.className='ans';
                              b.innerText=String.fromCharCode(65+i)+'. '+ans;b.onclick=()=>chooseAnswer(i);
                              wrap.appendChild(b);
                             });
}
  
function chooseAnswer(i){
  const q=questions[currentIndex];
  const btns=[...document.querySelectorAll('.ans')];
  btns.forEach(b=>b.disabled=true);
  if(i===q.correct){
    score++;
    btns[i].classList.add('correct');
  }else{
    btns[i].classList.add('wrong');
    btns[q.correct].classList.add('correct');
  }
  updateUI();
  setTimeout(()=>{document.getElementById('popup').style.display='none';
                  questions.splice(currentIndex,1);
                  updateUI();
                  f(questions.length===0)finishGame();
                 },1000);
}
  
function finishGame(){
  clearInterval(timer);
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('popup').style.display='none';
  document.getElementById('finalText').innerHTML=score>=3?`Bạn đạt <b>${score}/${totalAsked}</b> điểm.<br>🎁 Chúc mừng! Đủ điều kiện nhận quà.`:`Bạn đạt <b>${score}/${totalAsked}</b> điểm.<br>💪 Hãy thử lại nhé!`;
  document.getElementById('finish').style.display='flex';
}
  
function restartGame(){location.reload();}
initGame();
</script>
<!-- HƯỚNG DẪN JSON:
Tạo file assets/question_game1/questions.json
[
 {"q":"Câu hỏi 1?","answers":["A","B","C","D"],"correct":0},
 {"q":"Câu hỏi 2?","answers":["A","B","C","D"],"correct":2}
]
correct: 0=A,1=B,2=C,3=D
-->
</body>
</html>
